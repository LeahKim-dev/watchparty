<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">2026 LoL KeSPA Cup</title>
  
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

  <meta name="version" content="1.6">

  <script>
    setInterval(function() {
      // URL 뒤에 무작위 타임스탬프를 붙여 깃허브 캐시를 우회하여 최신 HTML을 강제로 조회합니다.
      const cacheBuster = window.location.href.split('?')[0] + '?v=' + new Date().getTime();
      
      fetch(cacheBuster, { cache: "no-store" })
        .then(response => response.text())
        .then(htmlText => {
          const parser = new DOMParser();
          const doc = parser.parseFromString(htmlText, "text/html");
          
          // 서버(깃허브)에 방금 올라간 최신 버전 확인
          const serverVersion = doc.querySelector('meta[name="version"]')?.getAttribute('content');
          // 시청자가 지금 브라우저에 켜놓고 있는 현재 버전 확인
          const currentVersion = document.querySelector('meta[name="version"]')?.getAttribute('content');
          
          // 서버 버전과 현재 버전이 다르면 (즉, 내가 새로 배포했다면)
          if (serverVersion && currentVersion && serverVersion !== currentVersion) {
            console.log(`[배포 감지] 새 버전(v${serverVersion})이 확인되어 화면을 새로고침합니다.`);
            window.location.reload(true); // 시청자 화면 강제 새로고침
          }
        })
        .catch(err => console.log("버전 체크 중 오류 발생:", err));
    }, 30000); // 30초마다 몰래 체크 (평소에는 화면 깜빡임이나 끊김이 전혀 없습니다)
  </script>

<style>

    overflow: hidden;

    padding: 4rem 3.5rem;

  .team { display: flex; flex-direction: column; align-items: center; gap: 18px; }

  /* 팀 배지 공통 */

    width: 120px; height: 120px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }

  }

  .team-region { font-size: 16px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }

  .score-btn-group { display: flex; gap: 10px; margin-top: 8px; }
  .btn-score {

    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    color: var(--text);
    font-size: 26px;
    width: 54px; height: 54px;
    cursor: pointer;
    transition: background 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-score:hover { background: rgba(255,255,255,0.14); }
  .btn-score:active { transform: scale(0.92); }

  /* SCORE CENTER */
  .score-center { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .series-score { display: flex; align-items: center; gap: 18px; }
  .series-num {
    font-size: 100px; font-weight: 800; line-height: 1;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.03em;
    transition: transform 0.15s ease;
  }
  .series-num.pop { animation: popAnim 0.35s ease; }
  @keyframes popAnim {
    0% { transform: scale(1); }
    40% { transform: scale(1.35); }
    100% { transform: scale(1); }
  }
  .series-sep { font-size: 64px; color: var(--muted); font-weight: 300; }
  .series-format { font-size: 16px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
  .live-badge {
    display: flex; align-items: center; gap: 8px;
    font-size: 15px; color: #ff4d4d;
    letter-spacing: 0.08em; text-transform: uppercase;
    font-weight: 600; /* ????????? */
  }
  .live-dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: #ff4d4d;
    animation: blink 1.4s ease-in-out infinite;

  .game-time-display {

    letter-spacing: -0.02em;
    color: var(--accent); line-height: 1;

  .btn-timer {

    display: none;
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.4); /* 스크린 이외 공간 암전 극대화 */

  }

    display: flex;
    flex-direction: column;
    justify-content: center;

  }

</head>

  // 실시간 점수 관리 변수
  let scoreLeft = 0, scoreRight = 0;
  let timerSec = 0, timerRunning = false, timerInterval = null;

// 화면 초기 세팅 빌더 함수
  function initLayout() {
    const leftData = dbTeams[teamLeft];
    const rightData = dbTeams[teamRight];

    if(!leftData || !rightData) return alert("팀 설정 매칭 변수 오류!");

    // 브라우저 타이틀 설정
    document.getElementById('page-title').textContent = `${leftData.name} vs ${rightData.name} — 26 KeSPA Cup`;

    // 왼쪽 팀 렌더링
    document.getElementById('name-left').textContent = leftData.name;
    document.getElementById('region-left').textContent = leftData.region;
    const bLeft = document.getElementById('badge-left');
    bLeft.style.background = leftData.bgStyle;
    bLeft.style.border = `4px solid ${leftData.color}`;
    bLeft.style.boxShadow = `0 0 50px ${leftData.shadow}`;
    bLeft.innerHTML = `<img src="${leftData.logoUrl}" alt="${leftData.name}">`;
    if(leftData.hasBg) bLeft.classList.add('has-bg');

    // 오른쪽 팀 렌더링
    document.getElementById('name-right').textContent = rightData.name;
    document.getElementById('region-right').textContent = rightData.region;
    const bRight = document.getElementById('badge-right');
    bRight.style.background = rightData.bgStyle;
    bRight.style.border = `4px solid ${rightData.color}`;
    bRight.style.boxShadow = `0 0 50px ${rightData.shadow}`;
    bRight.innerHTML = `<img src="${rightData.logoUrl}" alt="${rightData.name}">`;
    if(rightData.hasBg) bRight.classList.add('has-bg');
  }

  // 실행 호출
  initLayout();

  // 자릿수 보정 유틸
  function pad(n) { return String(n).padStart(2,'0'); }

  // 상단 실제 클록 시계 고정
  function tick() {
    const now = new Date();
    document.getElementById('realtime').textContent =
      pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());
  }
  tick(); setInterval(tick, 1000);

  // 게임 타이머 디스플레이 인터페이스 업데이트
  function updateTimerDisplay() {
    document.getElementById('game-timer').textContent =
      pad(Math.floor(timerSec/60))+':'+pad(timerSec%60);
  }
  function startTimer() {
    if (timerRunning) return;
    timerRunning = true;
    document.getElementById('btn-start').textContent = '▶ 진행 중';
    timerInterval = setInterval(()=>{ timerSec++; updateTimerDisplay(); }, 1000);
  }
  function pauseTimer() {
    if (!timerRunning) return;
    timerRunning = false;
    clearInterval(timerInterval);
    document.getElementById('btn-start').textContent = '▶ 재개';
  }
  function resetTimer() {
    pauseTimer(); timerSec = 0; updateTimerDisplay();
    document.getElementById('input-min').value = 0;
    document.getElementById('input-sec').value = 0;
    document.getElementById('btn-start').textContent = '▶ 시작';
  }
  function setManualTime() {
    const m = parseInt(document.getElementById('input-min').value)||0;
    const s = parseInt(document.getElementById('input-sec').value)||0;
    const was = timerRunning;
    pauseTimer();
    timerSec = m*60 + Math.min(s,59);
    updateTimerDisplay();
    if (was) startTimer();
  }

  // 스코어 팝 애니메이션 제어
  function popScore(id) {
    const el = document.getElementById(id);
    el.classList.remove('pop');
    void el.offsetWidth;
    el.classList.add('pop');
  }

  // 실시간 세트 증감 핸들러
  function changeScore(side, delta) {
    if (side === 'left') {
      scoreLeft = Math.max(0, Math.min(3, scoreLeft + delta));
      document.getElementById('set-left').textContent = scoreLeft;
      if (delta > 0) popScore('set-left');
    } else {
      scoreRight = Math.max(0, Math.min(3, scoreRight + delta));
      document.getElementById('set-right').textContent = scoreRight;
      if (delta > 0) popScore('set-right');
    }
    
    const nextGame = Math.min(scoreLeft + scoreRight + 1, 5);
    document.getElementById('game-num').innerHTML = nextGame + '<span class="set-text">세트</span>';
    document.getElementById('game-num-sub').textContent = nextGame;
    checkWinner();
  }

  // 위너 체크 인터페이스
  function checkWinner() {
    const el = document.getElementById('winner-text');
    if (scoreLeft === 1) {
      el.textContent = `🏆 ${dbTeams[teamLeft].name} 승리!`;
      showWinner(dbTeams[teamLeft].name, dbTeams[teamLeft].confetti, dbTeams[teamLeft].winnerImgUrl);
    } else if (scoreRight === 1) {
      el.textContent = `🏆 ${dbTeams[teamRight].name} 승리!`;
      showWinner(dbTeams[teamRight].name, dbTeams[teamRight].confetti, dbTeams[teamRight].winnerImgUrl);
    } else {
      el.textContent = '';
    }
  }

  // 위너 모달 오버레이 바인딩 + 폭죽 컬러 동적 할당
  function showWinner(name, colors, winnerCustomImg) {
    const overlay = document.getElementById('winner-overlay');
    const txt = document.getElementById('winner-text-big');
    const img = document.getElementById('winner-custom-img');

    if (img) {
      if (winnerCustomImg) {
        txt.style.opacity = "0";
        img.onload = () => {
            txt.style.opacity = "1";
        };
        img.src = winnerCustomImg;
        img.style.display = 'block';
        img.closest('.winner-container').classList.add('has-photo');
      } else {
        img.style.display = 'none';
        img.closest('.winner-container').classList.remove('has-photo');
      }
    }

    if (txt) {
        const shadowColor = (Array.isArray(colors) && colors.length > 0) ? colors[0] : colors;
        txt.style.textShadow = `0 4px 25px rgba(0,0,0,1), 0 0 40px rgba(0,0,0,1), 0 0 15px ${shadowColor}`;

    txt.textContent = '🏆 ' + name + ' WIN!';
    if (overlay) {
        overlay.classList.add('show');
    }

    if (name === 'T1') {
      const duration = 6000;
      const animationEnd = Date.now() + duration;

      function randomInRange(min, max) { return Math.random() * (max - min) + min; }

      // 1. 양옆 대형 축포: 부드러운 곡선을 위해 gravity 낮추고 ticks(체공 시간) 늘림
      const cannonInterval = setInterval(function() {
        if (Date.now() > animationEnd) return clearInterval(cannonInterval);

        confetti({
          particleCount: 120, angle: 60, spread: 75, startVelocity: 80, gravity: 0.85, ticks: 300,
          origin: { x: -0.1, y: 1 }, colors: colors, zIndex: 99999
        });
        confetti({
          particleCount: 120, angle: 120, spread: 75, startVelocity: 80, gravity: 0.85, ticks: 300,
          origin: { x: 1.1, y: 1 }, colors: colors, zIndex: 99999
        });
      }, 1000); // 1초 주기로 여유 있게 펑!

      // 2. 메인 폭죽 & 눈송이: requestAnimationFrame 적용 (프레임 드랍 억제)
      let frameId;
      function frame() {
        if (Date.now() > animationEnd) return;

        // 사방에서 터지는 랜덤 불꽃
        if (Math.random() < 0.04) {
          confetti({
            particleCount: 60, startVelocity: 25, spread: 360, ticks: 200, gravity: 0.6, zIndex: 99999,
            colors: colors,
            origin: { x: randomInRange(0.1, 0.9), y: randomInRange(0.1, 0.4) }
          });
        }

        // 우아하게 떨어지는 금빛 눈송이 (천장에서 상시로 조금씩)
        if (Math.random() < 0.15) {
          confetti({
            particleCount: 2, startVelocity: 0, ticks: 600, gravity: 0.5, scale: 1.2,
            origin: { x: Math.random(), y: -0.1 },
            colors: ['#FFD700', '#ffffff'],
            drift: randomInRange(-0.8, 0.8),
            zIndex: 99999
          });
        }

        frameId = requestAnimationFrame(frame);
      }
      frame();

      setTimeout(() => { 
        overlay.classList.remove('show'); 
        cancelAnimationFrame(frameId); // 애니메이션 깔끔하게 종료
      }, 6500);

    } else {
      const end = Date.now() + 4000;
      (function frame() {
        confetti({ particleCount: 6, angle: 60, spread: 55, origin:{x:0}, colors, zIndex: 99999 });
        confetti({ particleCount: 6, angle: 120, spread: 55, origin:{x:1}, colors, zIndex: 99999 });
        if (Date.now() < end) requestAnimationFrame(frame);
      })();
      
      setTimeout(()=>{ overlay.classList.remove('show'); }, 4500);
      }
    }
  }

  // 전체 초기화 (버그 수정 완비)
  function resetAll() {
    if (!confirm('전체 초기화하시겠습니까?')) return;
    scoreLeft = 0; scoreRight = 0;
    document.getElementById('set-left').textContent = 0;
    document.getElementById('set-right').textContent = 0;
    document.getElementById('game-num').textContent = 1;
    document.getElementById('game-num-sub').textContent = 1;
    document.getElementById('winner-text').textContent = '';
    resetTimer();
